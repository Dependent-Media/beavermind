name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Only one E2E run at a time — they all rsync to and exercise the same
# testbeavermind site, so concurrent runs would race on the deployed code
# and on test-page IDs. Don't cancel in progress; let each finish cleanly.
concurrency:
  group: e2e-testbeavermind
  cancel-in-progress: false

jobs:
  playwright:
    name: Clone-from-URL E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tests/playwright
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/playwright/package-lock.json

      - name: Install JS deps
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('tests/playwright/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Validate required secrets are present
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          missing=""
          [ -z "$SSH_PRIVATE_KEY" ] && missing="$missing SSH_PRIVATE_KEY"
          [ -z "$SSH_KNOWN_HOSTS" ] && missing="$missing SSH_KNOWN_HOSTS"
          [ -z "$SSH_HOST" ]        && missing="$missing SSH_HOST"
          [ -z "$SSH_USER" ]        && missing="$missing SSH_USER"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "::error::See docs/ci-setup.md for how to configure them."
            exit 1
          fi

      - name: Configure SSH for testbeavermind
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host testbeavermind
              HostName $SSH_HOST
              User $SSH_USER
              IdentityFile ~/.ssh/id_ed25519
              IdentitiesOnly yes
              StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config
          ssh -o BatchMode=yes testbeavermind 'echo "ssh ok: $(whoami)@$(hostname)"'

      - name: Sync this PR's plugin code to testbeavermind
        # rsync excludes match build-release-zip.sh's logic: ship plugin source
        # + library + vendor + bin (utility scripts the smoke tests use) +
        # docs (referenced from the in-admin Docs page). Skip the macOS
        # TestRunner, Playwright project state, .git, .github, dist.
        # --delete keeps testbeavermind's plugin slot in sync with the PR
        # exactly — stale files don't survive a rebase.
        working-directory: ${{ github.workspace }}
        run: |
          rsync -az --delete \
            --exclude='/.git/' \
            --exclude='/.github/' \
            --exclude='/_TestRunner/' \
            --exclude='/dist/' \
            --exclude='/tests/playwright/node_modules/' \
            --exclude='/tests/playwright/test-results/' \
            --exclude='/tests/playwright/playwright-report/' \
            --exclude='/tests/playwright/.auth/' \
            --exclude='/tests/playwright/.env' \
            --exclude='**/.DS_Store' \
            ./ testbeavermind:httpdocs/wp-content/plugins/beavermind/

      - name: Generate Playwright auth state
        env:
          BM_SSH_HOST: testbeavermind
        run: bash scripts/generate-auth-state.sh

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          TEST_SITE_URL=https://testbeavermind.dependentmedia.com
          TEST_REFERENCE_URL=https://testbeavermind.dependentmedia.com/beavermind-fixtures/example-landing.html
          EOF

      - name: Run Playwright tests
        run: npx playwright test --reporter=list,html

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright/playwright-report/
          retention-days: 14

      - name: Upload videos / screenshots / traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tests/playwright/test-results/
          retention-days: 14
